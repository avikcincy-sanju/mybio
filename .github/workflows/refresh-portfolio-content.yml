name: Refresh portfolio content

on:
  workflow_dispatch:
  schedule:
    - cron: '17 12 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/refresh-portfolio-content.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh industry headlines
        run: node scripts/update-headlines.mjs

      - name: Refresh Zenodo metadata
        run: node scripts/update-zenodo-records.mjs

      - name: Commit refreshed content
        shell: bash
        run: |
          if git diff --quiet -- public/headlines.json public/zenodo-records.json; then
            echo "No content changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/headlines.json public/zenodo-records.json
          git commit -m "chore: refresh portfolio content"
          git push
